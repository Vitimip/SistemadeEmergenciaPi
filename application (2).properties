package com.vitalistech.emergencysystem.patterns.decorator;

/**
 * Padrão Decorator.
 *
 * Objetivo:
 * Permitir adicionar novas responsabilidades a um objeto
 * dinamicamente, sem modificar sua implementação original.
 */
public abstract class AtendimentoDecorator implements Atendimento {

    protected Atendimento atendimento;

    public AtendimentoDecorator(Atendimento atendimento) {
        this.atendimento = atendimento;
    }
}