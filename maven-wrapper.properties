REQUEST FOR CHANGE (RFC)

ID: RFC-001
Projeto: Emergency System SPA

Descrição:
Implementação do módulo de gerenciamento de pacientes no sistema.

Justificativa:
Necessidade de controle de registros de pacientes no sistema de emergência.

Impacto:
- Backend: criação de PacienteController, Model e Service
- Frontend: criação de tela SPA em Angular
- Banco: persistência no H2 (file mode)

Versão aplicada:
v1.1.0

Status:
Aprovado e implementado